name: Build Release APK

# 触发条件：推送到 main 分支、打 tag（v* 格式）、或手动触发
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置 JDK 17（AGP 8.9 要求 JDK 17+）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. 缓存 Gradle 依赖，加速后续构建
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 4. 确认 Android SDK 组件就绪
      - name: Ensure Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "build-tools;35.0.0" "platforms;android-35" || true

      # 5. 使用内置 keytool 生成测试签名 keystore
      - name: Generate test signing keystore
        run: |
          echo "使用 keytool 生成测试用 keystore..."
          keytool -genkeypair -v \
            -keystore $RUNNER_TEMP/novelforge_test.keystore \
            -alias novelforge_test \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass novelforge_test -keypass novelforge_test \
            -dname "CN=NovelForge Test, OU=Dev, O=NovelForge, L=Beijing, ST=Beijing, C=CN"
          echo "测试 keystore 已生成"
          ls -lh $RUNNER_TEMP/novelforge_test.keystore

      # 6. 构建 Release APK
      - name: Build Release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/novelforge_test.keystore
          SIGNING_KEYSTORE_PASSWORD: novelforge_test
          SIGNING_KEY_ALIAS: novelforge_test
          SIGNING_KEY_PASSWORD: novelforge_test
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 7. 校验 APK 签名
      - name: Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "校验 APK：$APK_PATH"
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose --print-certs "$APK_PATH" || true
          ls -lh app/build/outputs/apk/release/

      # 8. 重命名 APK（带版本号，方便识别）
      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          REF_NAME="${GITHUB_REF_NAME:-snapshot}"
          cp "$APK_PATH" "app/build/outputs/apk/release/NovelForge_${REF_NAME}.apk"
          ls -lh app/build/outputs/apk/release/

      # 9. 上传 APK 构建产物（Actions 页面下载）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelForge-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      # 10. 上传构建报告
      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          retention-days: 7
          if-no-files-found: ignore

      # 11. 打 tag 时自动发布 GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "NovelForge ${{ github.ref_name }}"
          body: |
            ## NovelForge ${{ github.ref_name }}

            小说创作助手 App，支持 AI 多模型写作、创作风格模板、双模导出。

            ### 变更
            - 查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/UPDATE/chenglog.md)

            ### 安装
            下载下方 APK 文件，在 Android 设备上直接安装。

            > **注意**：此 APK 使用测试签名，每次更新需卸载旧版本后重新安装。
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/NovelForge_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}